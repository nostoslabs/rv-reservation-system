name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-bump-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version was bumped
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:package.json | grep '"version"' | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          PR_VERSION=$(grep '"version"' package.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          TAURI_VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          CARGO_VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*= "\(.*\)".*/\1/')

          echo "Base version:  $BASE_VERSION"
          echo "PR version:    $PR_VERSION"
          echo "Tauri version: $TAURI_VERSION"
          echo "Cargo version: $CARGO_VERSION"

          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::Version in package.json ($PR_VERSION) was not bumped from main ($BASE_VERSION). Bump the version before merging."
            exit 1
          fi

          if [ "$PR_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PR_VERSION but tauri.conf.json=$TAURI_VERSION. All three version files must match."
            exit 1
          fi

          if [ "$PR_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PR_VERSION but Cargo.toml=$CARGO_VERSION. All three version files must match."
            exit 1
          fi

          echo "Version bump verified: $BASE_VERSION → $PR_VERSION (all files match)"

  check-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
